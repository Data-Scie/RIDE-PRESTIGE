name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # prisma generate only needs this var to be present and well-formed, not reachable.
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
  JWT_SECRET: "ci-placeholder-secret-not-used-at-runtime"

jobs:
  api:
    name: API (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate --workspace=apps/api
      - run: npm run typecheck --workspace=apps/api
      - run: npm run build --workspace=apps/api

  web:
    name: Web (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=apps/web
      - run: npm run typecheck --workspace=apps/web
      - run: npm run build --workspace=apps/web

  mobile-lint:
    name: Mobile apps (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:mobile
